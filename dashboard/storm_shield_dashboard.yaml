  - type: grid
    cards:
      - type: custom:mushroom-title-card
        title: >-
          {% set lvl = states('sensor.storm_shield_alert_level') | int(0) %} {%
          if lvl >= 4 %}CRITICITÀ ELEVATA {% elif lvl >= 3 %}CRITICITÀ MODERATA
          {% elif lvl >= 2 %}CRITICITÀ ORDINARIA {% else %}BOLLETTINO{% endif %}
        subtitle: ""
        card_mod:
          style: >
            {% set lvl = states('sensor.storm_shield_alert_level') | int(0) %}
            {% set palette = {0:
            {'c1':'#00bcd4','c2':'#4dd0e1','rgb':'0,188,212','emoji':'📋'},
                              1: {'c1':'#4CAF50','c2':'#81C784','rgb':'76,175,80','emoji':'🟢'},
                              2: {'c1':'#FFD600','c2':'#FFEE58','rgb':'255,214,0','emoji':'🟡'},
                              3: {'c1':'#FF6D00','c2':'#FFA726','rgb':'255,109,0','emoji':'🟠'},
                              4: {'c1':'#F44336','c2':'#EF5350','rgb':'244,67,54','emoji':'🔴'}} %}
            {% set p = palette.get(lvl, palette[0]) %}

            ha-card { background: linear-gradient(135deg, rgba(20,20,35,0.95)
            0%, rgba(30,40,60,0.90) 50%, rgba(20,30,50,0.95) 100%); border: 1px
            solid rgba({{ p.rgb }},0.22); border-radius: 24px; padding: 18px
            24px 14px 24px; position: relative; overflow: hidden; } ha-card
            .title { margin: 0 !important; font-size: 20px !important;
            font-weight: 700 !important; line-height: 1.1; display: inline-flex;
            align-items: center; gap: 10px; background: linear-gradient(90deg,
            {{ p.c1 }}, {{ p.c2 }}, {{ p.c1 }}); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; } ha-card .title::before {
            content: "{{ p.emoji }}"; font-size: 20px; -webkit-text-fill-color:
            {{ p.c1 }}; background: none !important; filter: drop-shadow(0 0 5px
            rgba({{ p.rgb }},0.55)); } ha-card .subtitle { display: none
            !important; } ha-card::after { content: ""; display: block; width:
            100%; height: 3px; margin-top: 8px; border-radius: 999px;
            background-image: linear-gradient(90deg, rgba({{ p.rgb }},0.22),
            rgba({{ p.rgb }},0.22)), linear-gradient(90deg, transparent 0%,
            rgba({{ p.rgb }},0.00) 12%, rgba({{ p.rgb }},0.85) 28%, rgba({{
            p.rgb }},0.95) 45%, rgba(255,255,255,1.00) 50%, rgba({{ p.rgb
            }},0.95) 55%, rgba({{ p.rgb }},0.85) 72%, transparent 100%),
            radial-gradient(circle, rgba(255,255,255,1.00) 0%,
            rgba(255,255,255,0.70) 35%, rgba({{ p.rgb }},0.35) 58%, transparent
            72%); background-size: 100% 100%, 240% 100%, 22px 22px;
            background-repeat: no-repeat; background-position: 0% 0, 120% 0,
            -14px 50%; animation: sweep-sec 2.7s ease-in-out infinite alternate;
            box-shadow: 0 0 12px rgba({{ p.rgb }},0.55); pointer-events: none; }
            @keyframes shine { to { background-position: 200% center; } }
            @keyframes sweep-sec { 0% { background-position: 0% 0, 120% 0, -14px
            50%; opacity: 0.65; } 50% { opacity: 1; } 100% {
            background-position: 0% 0, -20% 0, calc(100% + 14px) 50%; opacity:
            0.65; } }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.storm_shield_alert_level
            above: 1
        card:
          type: horizontal-stack
          cards:
            - type: markdown
              content: >-
                {% set entity = 'sensor.dpc_alert' %} {% set color = {0:'#888',
                1:'#4CAF50', 2:'#FFD600', 3:'#FF6D00', 4:'#F44336'} %} {% set
                label = {0:'—', 1:'VERDE', 2:'GIALLA', 3:'ARANCIONE', 4:'ROSSA'}
                %} {% set emoji = {'Temporali':'⛈️', 'Idraulico':'💧',
                'Idrogeologico':'🌊'} %}

                <span style="font-size:9px; letter-spacing:2px; opacity:0.4;
                text-transform:uppercase;">PROTEZIONE CIVILE</span>

                📍 <span style="font-size:12px; font-weight:700;">{{
                state_attr(entity, 'zone_name') }}</span>

                <span style="font-size:10px; letter-spacing:1.5px;
                font-weight:700; opacity:0.4;">▎OGGI</span> {%- set events =
                state_attr(entity, 'events_today') %} {%- set d =
                state_attr(entity, 'today') %} {%- if events and events | length
                > 0 %} {%- for ev in events %}

                <font color="{{ color.get(ev['level'], '#888') }}"><ha-icon
                icon="{{ 'mdi:numeric-' ~ ev['level'] ~ '-box' }}"
                style="--mdc-icon-size:18px;"></ha-icon> **{{
                label.get(ev['level'], '?') }}**</font> {{ emoji.get(ev['risk'],
                '⚠️') }} <font color="{{ color.get(ev['level'], '#888') }}">{{
                ev.get('risk', '') }}</font> {%- endfor %} {%- elif d and
                d['level'] | int(0) >= 1 %}

                <font color="{{ color.get(d['level'], '#888') }}"><ha-icon
                icon="{{ 'mdi:numeric-' ~ d['level'] | int ~ '-box' }}"
                style="--mdc-icon-size:18px;"></ha-icon> **{{
                label.get(d['level'], '?') }}**</font> {%- else %}

                <span style="opacity:0.5;">✅ Nessuna</span> {%- endif %}
              card_mod:
                style: |
                  ha-card {
                    {% set d = state_attr('sensor.dpc_alert', 'today') %}
                    {% set lvl = d['level'] | int(0) if d and d['level'] is defined else 0 %}
                    {% set c = {0:'100,100,130', 1:'76,175,80', 2:'255,214,0', 3:'255,109,0', 4:'244,67,54'} %}
                    {% set cv = c.get(lvl, '100,100,130') %}
                    background:
                      linear-gradient(
                        160deg,
                        rgba({{ cv }}, 0.10) 0%,
                        rgba(15,15,28, 0.97) 50%,
                        rgba(15,15,28, 0.99) 100%
                      );
                    border: 1px solid rgba({{ cv }}, 0.25);
                    border-left: 3px solid rgba({{ cv }}, 0.60);
